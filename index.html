<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>執房排班表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F5F3EE; --surface: #FFFFFF; --surface2: #EDEBE6;
    --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.16);
    --text: #1A1814; --text-secondary: #6B6860; --text-muted: #A09E98;
    --accent: #2D5016; --accent-light: #E8F0DF; --accent-mid: #4A7A28;
    --mk: #C17A2E; --mk-light: #FBF0E0; --mk-border: rgba(193,122,46,0.25);
    --lck: #1F5B78; --lck-light: #E0EFF6; --lck-border: rgba(31,91,120,0.25);
    --kt: #6B3F8A; --kt-light: #F0E8F8; --kt-border: rgba(107,63,138,0.25);
    --aimee: #E53E3E; --aimee-light: #FFF5F5;
    --ken: #3182CE; --ken-light: #EBF8FF;
    --mama: #38A169; --mama-light: #F0FFF4;
    --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }

  .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .app-title span { color: var(--accent-mid); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-status { font-size: 10px; color: var(--text-muted); }
  .sync-btn { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(45,80,22,0.2); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
  .sync-btn:active { opacity: 0.7; } .sync-btn:disabled { opacity: 0.45; }

  .month-nav { display: flex; align-items: center; background: var(--surface2); border-radius: 20px; padding: 2px; }
  .month-nav button { background: none; border: none; width: 30px; height: 30px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 18px; }
  .month-nav button:active { background: var(--border); }
  .month-label { flex: 1; text-align: center; font-size: 13px; font-weight: 600; }

  .tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 10px 4px 9px; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-light); }

  .main { padding-bottom: 32px; }

  /* Calendar */
  .calendar-wrap { background: var(--surface); }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--border); }
  .cal-wd { text-align: center; padding: 6px 0; font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; }
  .cal-wd.sat { color: #3182CE; } .cal-wd.sun { color: #E53E3E; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
  .cal-cell { min-height: 52px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px 3px 3px; cursor: pointer; transition: background 0.1s; }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:active { background: var(--surface2); }
  .cal-cell.other-month { background: #FAFAF8; }
  .cal-cell.today { background: var(--accent-light); }
  .cal-cell.selected { outline: 2px solid var(--accent-mid); outline-offset: -2px; }
  .cal-day-num { font-size: 12px; font-weight: 500; text-align: center; line-height: 20px; width: 20px; height: 20px; border-radius: 50%; margin: 0 auto 3px; display: block; }
  .cal-cell.today .cal-day-num { background: var(--accent); color: white !important; font-weight: 700; }
  .cal-cell.other-month .cal-day-num { color: var(--text-muted); }
  .cal-cell.sat-col .cal-day-num { color: #3182CE; }
  .cal-cell.sun-col .cal-day-num { color: #E53E3E; }
  .cal-dots { display: flex; justify-content: center; gap: 2px; flex-wrap: wrap; min-height: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-aimee { background: var(--aimee); } .dot-ken { background: var(--ken); } .dot-mama { background: var(--mama); }
  .cal-regions { display: flex; justify-content: center; gap: 1px; margin-top: 2px; flex-wrap: wrap; }
  .region-mini { width: 4px; height: 4px; border-radius: 1px; }
  .rm-mk { background: var(--mk); } .rm-lck { background: var(--lck); } .rm-kt { background: var(--kt); }

  .legend { display: flex; gap: 12px; padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Detail */
  .detail-panel { padding: 12px; }
  .detail-date-header { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; padding-left: 2px; }
  .no-booking { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; }

  .loc-card { border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 10px; overflow: hidden; background: var(--surface); transition: opacity 0.2s; }
  .loc-card.done { opacity: 0.55; }
  .loc-card.mk { border-color: var(--mk-border); } .loc-card.lck { border-color: var(--lck-border); } .loc-card.kt { border-color: var(--kt-border); }
  .loc-header { display: flex; align-items: center; padding: 10px 14px; gap: 8px; }
  .loc-header.mk { background: var(--mk-light); } .loc-header.lck { background: var(--lck-light); } .loc-header.kt { background: var(--kt-light); }
  .loc-icon { font-size: 15px; } .loc-name { font-weight: 700; font-size: 14px; flex: 1; }
  .loc-name.mk { color: var(--mk); } .loc-name.lck { color: var(--lck); } .loc-name.kt { color: var(--kt); }
  .loc-count { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .loc-count.mk { background: rgba(193,122,46,0.15); color: var(--mk); }
  .loc-count.lck { background: rgba(31,91,120,0.15); color: var(--lck); }
  .loc-count.kt { background: rgba(107,63,138,0.15); color: var(--kt); }
  .assigned-badge { display: flex; gap: 4px; }
  .assigned-pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
  .pill-aimee { background: var(--aimee-light); color: var(--aimee); }
  .pill-ken { background: var(--ken-light); color: var(--ken); }
  .pill-mama { background: var(--mama-light); color: var(--mama); }

  .room-list { border-top: 1px solid var(--border); }
  .room-row { display: flex; align-items: center; padding: 8px 14px; gap: 8px; border-bottom: 1px solid var(--border); }
  .room-row:last-child { border-bottom: none; }
  .room-row-name { font-size: 12px; font-weight: 500; flex: 1; color: var(--text-secondary); }
  .room-row-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-secondary); background: var(--surface2); border-radius: 5px; padding: 2px 7px; white-space: nowrap; }
  .pax-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; background: #FEF3C7; color: #92400E; }

  .loc-body { padding: 11px 14px; border-top: 1px solid var(--border); }
  .assign-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .assign-label { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .staff-chips { display: flex; gap: 5px; flex: 1; }
  .staff-chip { padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: opacity 0.12s, transform 0.1s; user-select: none; }
  .chip-aimee { background: var(--aimee-light); color: var(--aimee); border-color: rgba(229,62,62,0.25); }
  .chip-ken { background: var(--ken-light); color: var(--ken); border-color: rgba(49,130,206,0.25); }
  .chip-mama { background: var(--mama-light); color: var(--mama); border-color: rgba(56,161,105,0.25); }
  .staff-chip.selected { opacity: 1; } .staff-chip:not(.selected) { opacity: 0.3; }
  .staff-chip:active { transform: scale(0.94); }
  .done-btn { width: 100%; background: none; border: 1.5px solid var(--border-strong); border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; text-align: center; margin-bottom: 10px; }
  .done-btn.completed { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .note-input { width: 100%; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); background: var(--bg); resize: none; min-height: 38px; max-height: 100px; line-height: 1.6; }
  .note-input:focus { outline: none; border-color: var(--accent-mid); background: var(--surface); }
  .note-input::placeholder { color: var(--text-muted); }

  .day-notes-section { margin-top: 4px; }
  .day-notes-title { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; }
  .notes-feed { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .note-item { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .note-item:last-child { border-bottom: none; }
  .note-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .note-who { font-size: 11px; font-weight: 600; }
  .note-who.aimee { color: var(--aimee); } .note-who.ken { color: var(--ken); } .note-who.mama { color: var(--mama); }
  .note-where { font-size: 10px; color: var(--text-muted); background: var(--surface2); border-radius: 4px; padding: 1px 6px; }
  .note-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .notes-empty { padding: 14px; text-align: center; font-size: 12px; color: var(--text-muted); }

  /* Stats */
  .stats-wrap { padding: 12px; }
  .month-selector { display: flex; align-items: center; background: var(--surface); border-radius: 20px; padding: 2px; margin-bottom: 14px; border: 1px solid var(--border); }
  .month-selector button { background: none; border: none; width: 32px; height: 32px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 18px; }
  .month-selector button:active { background: var(--border); }
  .month-selector-label { flex: 1; text-align: center; font-size: 13px; font-weight: 600; }
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 8px; text-align: center; }
  .stat-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin: 0 auto 8px; }
  .stat-count { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
  .stat-name { font-size: 11px; color: var(--text-muted); }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; }
  .stats-row { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); display: flex; align-items: center; padding: 10px 12px; margin-bottom: 6px; gap: 10px; }
  .stats-row-label { width: 52px; font-size: 12px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
  .stats-row-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .stats-row-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .stats-row-count { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; min-width: 20px; text-align: right; }
  .region-stats-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-top: 14px; }
  .region-stat-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .region-stat-row:last-child { border-bottom: none; }

  /* Settings */
  .settings-wrap { padding: 12px; }
  .settings-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
  .settings-section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.6px; text-transform: uppercase; padding: 12px 14px 6px; }
  .settings-room-row { padding: 10px 14px; border-top: 1px solid var(--border); }
  .settings-room-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
  .settings-input { width: 100%; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text); background: var(--bg); }
  .settings-input:focus { outline: none; border-color: var(--accent-mid); }
  .save-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
  .save-btn:active { opacity: 0.85; }
  .info-box { margin-top: 12px; padding: 12px 14px; background: var(--accent-light); border-radius: var(--radius); border: 1px solid rgba(45,80,22,0.18); }
  .info-box-title { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 5px; }
  .info-box-body { font-size: 11px; color: var(--accent); line-height: 1.8; opacity: 0.88; }

  .loading { text-align: center; padding: 40px 20px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border-strong); border-top-color: var(--accent-mid); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--text-muted); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text); color: white; border-radius: 20px; padding: 9px 18px; font-size: 13px; font-weight: 500; z-index: 999; transition: transform 0.25s ease; white-space: nowrap; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .view { display: none; } .view.active { display: block; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">執房<span>排班</span></div>
    <div class="header-right">
      <span class="sync-status" id="sync-status"></span>
      <button class="sync-btn" id="sync-btn" onclick="manualSync()">↻ 同步</button>
    </div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label">—</div>
    <button onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchView('calendar',this)">📅 月曆</div>
  <div class="tab" onclick="switchView('stats',this)">📊 統計</div>
  <div class="tab" onclick="switchView('settings',this)">⚙️ 設定</div>
</div>

<div class="main">
  <div class="view active" id="view-calendar">
    <div class="calendar-wrap">
      <div class="cal-weekdays">
        <div class="cal-wd">一</div><div class="cal-wd">二</div><div class="cal-wd">三</div>
        <div class="cal-wd">四</div><div class="cal-wd">五</div>
        <div class="cal-wd sat">六</div><div class="cal-wd sun">日</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--aimee)"></div>Aimee</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--ken)"></div>Ken</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--mama)"></div>媽媽</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--mk)"></div>旺角</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--lck)"></div>荔枝角</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--kt)"></div>觀塘</div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="no-booking" style="padding:30px;color:var(--text-muted);font-size:12px;text-align:center">點擊日期查看詳情</div>
    </div>
  </div>

  <div class="view" id="view-stats">
    <div class="stats-wrap">
      <div class="month-selector">
        <button onclick="changeStatsMonth(-1)">‹</button>
        <div class="month-selector-label" id="stats-month-label">—</div>
        <button onclick="changeStatsMonth(1)">›</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-avatar" style="background:var(--aimee-light);color:var(--aimee)">A</div>
          <div class="stat-count" id="stat-aimee">0</div>
          <div class="stat-name">Aimee</div>
        </div>
        <div class="stat-card">
          <div class="stat-avatar" style="background:var(--ken-light);color:var(--ken)">K</div>
          <div class="stat-count" id="stat-ken">0</div>
          <div class="stat-name">Ken</div>
        </div>
        <div class="stat-card">
          <div class="stat-avatar" style="background:var(--mama-light);color:var(--mama)">媽</div>
          <div class="stat-count" id="stat-mama">0</div>
          <div class="stat-name">媽媽</div>
        </div>
      </div>
      <div class="section-label">地區完成次數</div>
      <div class="stats-row">
        <div class="stats-row-label"><span style="width:8px;height:8px;border-radius:50%;background:var(--mk);display:inline-block;flex-shrink:0"></span>旺角</div>
        <div class="stats-row-bar"><div class="stats-row-fill" id="bar-mk" style="width:0%;background:var(--mk)"></div></div>
        <div class="stats-row-count" id="count-mk">0</div>
      </div>
      <div class="stats-row">
        <div class="stats-row-label"><span style="width:8px;height:8px;border-radius:50%;background:var(--lck);display:inline-block;flex-shrink:0"></span>荔枝角</div>
        <div class="stats-row-bar"><div class="stats-row-fill" id="bar-lck" style="width:0%;background:var(--lck)"></div></div>
        <div class="stats-row-count" id="count-lck">0</div>
      </div>
      <div class="stats-row">
        <div class="stats-row-label"><span style="width:8px;height:8px;border-radius:50%;background:var(--kt);display:inline-block;flex-shrink:0"></span>觀塘</div>
        <div class="stats-row-bar"><div class="stats-row-fill" id="bar-kt" style="width:0%;background:var(--kt)"></div></div>
        <div class="stats-row-count" id="count-kt">0</div>
      </div>
      <div class="section-label" style="margin-top:14px">各地點完成次數</div>
      <div class="region-stats-card" id="region-stats-list"></div>
    </div>
  </div>

  <div class="view" id="view-settings">
    <div class="settings-wrap">
      <div class="settings-card">
        <div class="settings-section-title">Apps Script 網址</div>
        <div class="settings-room-row">
          <div class="settings-room-label">Google Apps Script 部署網址</div>
          <input class="settings-input" type="url" id="gas-url" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
      </div>
      <button class="save-btn" onclick="saveSettings()">💾 儲存設定</button>
      <div class="info-box">
        <div class="info-box-title">ℹ️ 跨裝置同步說明</div>
        <div class="info-box-body">
          指派、完成、備注資料儲存在 Google Apps Script，所有裝置開啟後自動同步，不需要額外設定。<br><br>
          如需更換 Apps Script 網址，在上方填入後儲存即可。
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwf1JlL_zqwd_YkZd7sCfzOjuU_TqVzE28CI7fFcj7OBN3MLZ8gyGWV90-X0KYcG4FtiQ/exec';

const ROOMS = [
  { id:'mk2505',  name:'冬日細語', region:'MK',  regionName:'旺角',   calId:'a0ace8fd0447dddd439785f5fc3d8b1b397045076ead6e077733d5c37a9ed65e@group.calendar.google.com' },
  { id:'mk4fb3',  name:'夏日微風', region:'MK',  regionName:'旺角',   calId:'90cefa4e66ad4dcb1e5c1500a3776808b86793e09047c32548672e80464e60d9@group.calendar.google.com' },
  { id:'kt1119',  name:'玫瑰莊園', region:'KT',  regionName:'觀塘',   calId:'54c07d664a85577b861a5776354a7b9926802b1bfea5dc2898043853f6bee0e0@group.calendar.google.com' },
  { id:'kt1120',  name:'蔚藍深空', region:'KT',  regionName:'觀塘',   calId:'d1784189d4cc853b85145acc7931fd82b5fc202c1d439eb167d595e636f7fccb@group.calendar.google.com' },
  { id:'kt1121',  name:'楓橋夜泊', region:'KT',  regionName:'觀塘',   calId:'ae0dcdff115803e332beaa2f1bced99518a33a90588c82bedc2830897dbb8b31@group.calendar.google.com' },
  { id:'lckg405', name:'藍霧海岸', region:'LCK', regionName:'荔枝角', calId:'d565a704ce7d1ef0e81df1d4bc927ec83b7622b53a2c48a0a31b800f22219da1@group.calendar.google.com' },
  { id:'lckg406', name:'落日珊瑚', region:'LCK', regionName:'荔枝角', calId:'4c5d1b44b3cb21c28201f23761e9299353ac6d14be616a0976b5ed1eef43e436@group.calendar.google.com' },
  { id:'lckg407', name:'碧海青風', region:'LCK', regionName:'荔枝角', calId:'e3d7849d1bf5874376d85dfb861774fa7ef40bc20935cebef14c8e4efee072c4@group.calendar.google.com' },
  { id:'lckg408', name:'月下金沙', region:'LCK', regionName:'荔枝角', calId:'14eca384f77fec90c21cf946f67b08b442ec21f884ac034a232849270cbd7dad@group.calendar.google.com' },
];
const REGIONS = [
  { id:'MK',  name:'旺角',   icon:'🏙️', cls:'mk' },
  { id:'LCK', name:'荔枝角', icon:'🌊', cls:'lck' },
  { id:'KT',  name:'觀塘',   icon:'🏢', cls:'kt' },
];
const STAFF_INFO = {
  'Aimee': { cls:'aimee', dotCls:'dot-aimee', pillCls:'pill-aimee', chipCls:'chip-aimee' },
  'Ken':   { cls:'ken',   dotCls:'dot-ken',   pillCls:'pill-ken',   chipCls:'chip-ken' },
  '媽媽':  { cls:'mama',  dotCls:'dot-mama',  pillCls:'pill-mama',  chipCls:'chip-mama' },
};
const SKIP = /^(業主|交租|冬日$|夏日$|冬$|夏$)/;

let state = {
  monthOffset: 0,
  statsMonthOffset: 0,
  selectedDate: null,
  events: [],
  tasks: {},
  gasUrl: GAS_URL
};

// ── Helpers ─────────────────────────────────────────────────
function taskKey(regionId, ds) { return regionId + '-' + ds; }
function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isToday(d) { return d.toDateString() === new Date().toDateString(); }
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// Extract pax from event title
function extractPax(title) {
  if (!title) return null;
  // patterns: 3ppl, 3pl, 3人, 3位, (3), x3, ×3, *3, 3pax, 3pp
  const m = title.match(/(\d+)\s*ppl/i) ||
            title.match(/(\d+)\s*pl\b/i) ||
            title.match(/[（(](\d+)[）)]/) ||
            title.match(/[×x\*](\d+)/) ||
            title.match(/(\d+)\s*[人位]/i) ||
            title.match(/(\d+)\s*pax/i) ||
            title.match(/(\d+)\s*pp/i);
  if (m) return parseInt(m[1]);
  return null;
}

// Deduplicate events: same room, same day → keep first booking only
function deduplicateEvents(events) {
  const seen = new Set();
  return events.filter(ev => {
    const key = ev.roomId + '-' + dateStr(ev.start);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

// ── State persistence ────────────────────────────────────────
function loadLocalState() {
  try {
    const s = localStorage.getItem('pr_v6');
    if (s) { const p = JSON.parse(s); state.gasUrl = p.gasUrl || GAS_URL; }
  } catch(e) {}
  document.getElementById('gas-url').value = state.gasUrl;
  try {
    const ec = sessionStorage.getItem('pr_ev6');
    if (ec) state.events = JSON.parse(ec).map(e => ({...e, start:new Date(e.start), end:e.end?new Date(e.end):null}));
  } catch(e) {}
}

function saveLocalState() {
  localStorage.setItem('pr_v6', JSON.stringify({ gasUrl: state.gasUrl }));
}

function saveSettings() {
  state.gasUrl = document.getElementById('gas-url').value.trim() || GAS_URL;
  saveLocalState(); showToast('✓ 設定已儲存');
}

// ── Remote task sync ─────────────────────────────────────────
async function loadRemoteTasks() {
  try {
    const res = await fetch(state.gasUrl + '?action=getTasks');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (data && typeof data === 'object' && !data.error) {
      state.tasks = data;
    }
  } catch(e) { console.warn('loadRemoteTasks err', e.message); }
}

async function saveRemoteTask(key, task) {
  try {
    await fetch(state.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveTask', key, task })
    });
  } catch(e) { console.warn('saveRemoteTask err', e.message); }
}

// ── View switching ───────────────────────────────────────────
function switchView(v, tab) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  tab.classList.add('active');
  if (v === 'stats') renderStats();
}

// ── Month navigation ─────────────────────────────────────────
function getMonthDates(offset) {
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const last  = new Date(first.getFullYear(), first.getMonth()+1, 0);
  return { first, last, year: first.getFullYear(), month: first.getMonth() };
}

function changeMonth(delta) { state.monthOffset += delta; renderCalendar(); }

function changeStatsMonth(delta) {
  state.statsMonthOffset += delta;
  renderStats();
}

// ── Calendar render ──────────────────────────────────────────
function renderCalendar() {
  const { first, last, year, month } = getMonthDates(state.monthOffset);
  const mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-label').textContent = `${year} ${mNames[month]}`;

  const startDow = (first.getDay() + 6) % 7;
  const totalCells = Math.ceil((startDow + last.getDate()) / 7) * 7;
  let html = '';

  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startDow + 1;
    const cellDate = new Date(year, month, dayNum);
    const isCurrentMonth = dayNum >= 1 && dayNum <= last.getDate();
    const ds = dateStr(cellDate);
    const today = isToday(cellDate);
    const isSelected = state.selectedDate === ds;
    const dow = i % 7;
    const isSat = dow === 5, isSun = dow === 6;

    const dayEvs = state.events.filter(e => e.start.toDateString() === cellDate.toDateString());
    const hasRegions = [...new Set(dayEvs.map(e => e.region))];
    const assignedStaff = [];
    REGIONS.forEach(r => {
      const task = state.tasks[taskKey(r.id, ds)];
      if (task && task.staff) task.staff.forEach(s => { if (!assignedStaff.includes(s)) assignedStaff.push(s); });
    });

    const dotsHtml = assignedStaff.map(s => `<div class="dot ${STAFF_INFO[s]?.dotCls||''}"></div>`).join('');
    const regHtml  = hasRegions.map(r => `<div class="region-mini rm-${r.toLowerCase()}"></div>`).join('');

    html += `<div class="cal-cell ${!isCurrentMonth?'other-month':''} ${today?'today':''} ${isSelected?'selected':''} ${isSat?'sat-col':''} ${isSun?'sun-col':''}"
      onclick="selectDate('${ds}',this)">
      <span class="cal-day-num">${cellDate.getDate()}</span>
      <div class="cal-dots">${dotsHtml}</div>
      <div class="cal-regions">${regHtml}</div>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  if (state.selectedDate) renderDetail(state.selectedDate);
}

function selectDate(ds, el) {
  state.selectedDate = ds;
  document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
  if (el) el.classList.add('selected');
  renderDetail(ds);
}

// ── Detail render ─────────────────────────────────────────────
function renderDetail(ds) {
  const date = new Date(ds + 'T00:00:00');
  const w = ['日','一','二','三','四','五','六'];
  const dateLabel = `${date.getMonth()+1}月${date.getDate()}日 週${w[date.getDay()]}`;

  // Get events for this day, dedup (same room same day → first booking only)
  const allDayEvs = state.events.filter(e => e.start.toDateString() === date.toDateString());
  const dayEvs = deduplicateEvents(allDayEvs);

  const byRegion = {};
  REGIONS.forEach(r => byRegion[r.id] = []);
  dayEvs.forEach(ev => { if (byRegion[ev.region]) byRegion[ev.region].push(ev); });
  // Always show all regions (even with 0 bookings) so staff can be assigned
  const activeRegions = REGIONS;

  let html = `<div class="detail-date-header">${dateLabel}</div>`;

  {
    activeRegions.forEach(region => {
      const evs = byRegion[region.id].sort((a,b) => a.start-b.start);
      const key = taskKey(region.id, ds);
      const task = state.tasks[key] || {staff:[],done:false,note:''};

      const chips = ['Aimee','Ken','媽媽'].map(s => {
        const info = STAFF_INFO[s];
        const sel = task.staff && task.staff.includes(s) ? 'selected' : '';
        return `<div class="staff-chip ${info.chipCls} ${sel}" onclick="toggleStaff('${key}','${s}',this,'${ds}')">${s}</div>`;
      }).join('');

      const roomRows = evs.map(ev => {
        const pax = extractPax(ev.title);
        const paxTag = (pax !== null && pax >= 5)
          ? `<span class="pax-tag">${pax}人</span>` : '';
        return `<div class="room-row">
          <span class="room-row-name">${ev.roomName}</span>
          <span class="room-row-time">${ev.startTime||'—'}${ev.endTime?'–'+ev.endTime:''}</span>
          ${paxTag}
        </div>`;
      }).join('');

      const badgeHtml = task.staff && task.staff.length
        ? `<div class="assigned-badge">${task.staff.map(s=>`<span class="assigned-pill ${STAFF_INFO[s]?.pillCls||''}">${s}</span>`).join('')}</div>` : '';

      html += `<div class="loc-card ${region.cls} ${task.done?'done':''}" id="loc-${key}">
        <div class="loc-header ${region.cls}">
          <span class="loc-icon">${region.icon}</span>
          <span class="loc-name ${region.cls}">${region.name}</span>
          <span class="loc-count ${region.cls}">${evs.length} 間</span>
          ${badgeHtml}
        </div>
        ${evs.length > 0 ? `<div class="room-list">${roomRows}</div>` : ''}
        <div class="loc-body">
          <div class="assign-row">
            <span class="assign-label">指派</span>
            <div class="staff-chips">${chips}</div>
          </div>
          <button class="done-btn ${task.done?'completed':''}" onclick="toggleDone('${key}',this,'${ds}')">
            ${task.done?'✓ 已完成打掃':'確認完成打掃'}
          </button>
          <textarea class="note-input" placeholder="備注今日打掃狀況…" rows="2"
            onchange="saveNote('${key}',this.value,'${ds}')">${task.note||''}</textarea>
        </div>
      </div>`;
    });
  }

  // Notes feed
  const allNotes = [];
  REGIONS.forEach(r => {
    const key = taskKey(r.id, ds);
    const task = state.tasks[key];
    if (task && task.note && task.note.trim()) {
      const who = (task.staff && task.staff.length) ? task.staff[0] : '—';
      allNotes.push({ who, where: r.name, note: task.note.trim(), cls: STAFF_INFO[who]?.cls||'mama' });
    }
  });

  html += `<div class="day-notes-section" style="margin-top:12px">
    <div class="day-notes-title">當日備注</div>
    <div class="notes-feed">`;
  if (allNotes.length) {
    allNotes.forEach(n => {
      html += `<div class="note-item">
        <div class="note-meta"><span class="note-who ${n.cls}">${n.who}</span><span class="note-where">${n.where}</span></div>
        <div class="note-text">${n.note}</div>
      </div>`;
    });
  } else {
    html += `<div class="notes-empty">暫無備注</div>`;
  }
  html += `</div></div>`;
  document.getElementById('detail-panel').innerHTML = html;
}

// ── Task actions (save remotely) ──────────────────────────────
function ensureTask(key) {
  if (!state.tasks[key]) state.tasks[key] = {staff:[],done:false,note:''};
}

function toggleStaff(key, name, el, ds) {
  ensureTask(key);
  const t = state.tasks[key];
  const i = t.staff.indexOf(name);
  if (i > -1) { t.staff.splice(i,1); el.classList.remove('selected'); }
  else { t.staff.push(name); el.classList.add('selected'); }
  saveRemoteTask(key, t);
  // Update badge + calendar dots
  const card = document.getElementById('loc-'+key);
  if (card) {
    const badge = card.querySelector('.assigned-badge');
    if (badge) badge.innerHTML = t.staff.map(s=>`<span class="assigned-pill ${STAFF_INFO[s]?.pillCls||''}">${s}</span>`).join('');
  }
  updateCalCell(ds);
}

function toggleDone(key, btn, ds) {
  ensureTask(key);
  const t = state.tasks[key];
  t.done = !t.done;
  btn.textContent = t.done ? '✓ 已完成打掃' : '確認完成打掃';
  btn.classList.toggle('completed', t.done);
  const card = document.getElementById('loc-'+key);
  if (card) card.classList.toggle('done', t.done);
  saveRemoteTask(key, t);
  showToast(t.done ? '✓ 標記完成！' : '取消完成');
}

function saveNote(key, val, ds) {
  ensureTask(key);
  state.tasks[key].note = val;
  saveRemoteTask(key, state.tasks[key]);
  renderDetail(ds);
}

// Update just the dots on a specific calendar cell without full re-render
function updateCalCell(ds) {
  const cells = document.querySelectorAll('.cal-cell');
  cells.forEach(cell => {
    const onclick = cell.getAttribute('onclick') || '';
    if (onclick.includes(`'${ds}'`)) {
      const assignedStaff = [];
      REGIONS.forEach(r => {
        const task = state.tasks[taskKey(r.id, ds)];
        if (task && task.staff) task.staff.forEach(s => { if (!assignedStaff.includes(s)) assignedStaff.push(s); });
      });
      const dotsEl = cell.querySelector('.cal-dots');
      if (dotsEl) dotsEl.innerHTML = assignedStaff.map(s=>`<div class="dot ${STAFF_INFO[s]?.dotCls||''}"></div>`).join('');
    }
  });
}

// ── Fetch calendar ────────────────────────────────────────────
async function fetchRoom(room) {
  const url = state.gasUrl + '?action=calendar&id=' + encodeURIComponent(room.calId);
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('bad');
    return data
      .filter(ev => ev.title && !SKIP.test(ev.title.trim()))
      .map(ev => ({
        id: ev.id, roomId: room.id, roomName: room.name,
        region: room.region, regionName: room.regionName,
        title: ev.title,
        // Use start date for classification (handles cross-day bookings)
        start: new Date(ev.start), end: ev.end ? new Date(ev.end) : null,
        startTime: fmtTime(ev.start), endTime: fmtTime(ev.end)
      }));
  } catch(e) { console.warn('err', room.id, e.message); return null; }
}

async function doSync(showToastMsg = true) {
  const btn = document.getElementById('sync-btn');
  const status = document.getElementById('sync-status');
  btn.textContent = '⏳'; btn.disabled = true;
  status.textContent = '同步中…';

  // Fetch calendar + tasks in parallel
  const [calResults, _] = await Promise.all([
    Promise.all(ROOMS.map(r => fetchRoom(r))),
    loadRemoteTasks()
  ]);

  const errors = [];
  const fresh = [];
  calResults.forEach((r,i) => { if (r===null) errors.push(ROOMS[i].name); else fresh.push(...r); });

  if (fresh.length > 0) {
    state.events = fresh;
    try {
      sessionStorage.setItem('pr_ev6', JSON.stringify(
        state.events.map(e => ({...e, start:e.start.toISOString(), end:e.end?e.end.toISOString():null}))
      ));
    } catch(e) {}
  }

  btn.textContent = '↻ 同步'; btn.disabled = false;
  const now = new Date();
  status.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 更新`;

  renderCalendar();
  if (state.selectedDate) renderDetail(state.selectedDate);

  if (showToastMsg) {
    if (errors.length) showToast(`⚠️ ${errors.join('、')} 讀取失敗`);
    else showToast(`✓ 同步完成`);
  }
}

function manualSync() { doSync(true); }

// ── Stats ─────────────────────────────────────────────────────
function renderStats() {
  const now = new Date();
  const targetDate = new Date(now.getFullYear(), now.getMonth() + state.statsMonthOffset, 1);
  const yr = targetDate.getFullYear(), mo = targetDate.getMonth();
  const mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('stats-month-label').textContent = `${yr} ${mNames[mo]}`;

  const staff = {Aimee:0,Ken:0,'媽媽':0};
  const regions = {MK:0,LCK:0,KT:0};

  for (const [key, task] of Object.entries(state.tasks)) {
    if (!task.done) continue;
    // key: "KT-2026-05-26"
    const parts = key.split('-');
    if (parts.length < 4) continue;
    const rId = parts[0];
    const ty = parseInt(parts[1]), tm = parseInt(parts[2])-1;
    if (ty !== yr || tm !== mo) continue;
    if (task.staff) task.staff.forEach(s => { if (s in staff) staff[s]++; });
    if (rId in regions) regions[rId]++;
  }

  document.getElementById('stat-aimee').textContent = staff['Aimee'];
  document.getElementById('stat-ken').textContent   = staff['Ken'];
  document.getElementById('stat-mama').textContent  = staff['媽媽'];

  const total = Math.max(1, Object.values(regions).reduce((a,b)=>a+b,0));
  ['MK','LCK','KT'].forEach(r => {
    const k = r.toLowerCase();
    document.getElementById('count-'+k).textContent = regions[r];
    document.getElementById('bar-'+k).style.width = Math.round(regions[r]/total*100)+'%';
  });

  const list = document.getElementById('region-stats-list');
  list.innerHTML = REGIONS.slice().sort((a,b)=>(regions[b.id]||0)-(regions[a.id]||0)).map(r =>
    `<div class="region-stat-row">
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--${r.cls});display:inline-block"></span>${r.name}
      </span>
      <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:500">${regions[r.id]||0}</span>
    </div>`
  ).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Init ──────────────────────────────────────────────────────
loadLocalState();
renderCalendar();
state.selectedDate = dateStr(new Date());
renderDetail(state.selectedDate);
// Auto sync on load
setTimeout(() => doSync(false), 600);
// Re-sync every 5 minutes to pick up task changes from other devices
setInterval(() => doSync(false), 30 * 1000);
</script>
